{% extends "base.html" %}
{% block title %}Login - PromptVault{% endblock %}
{% block auth_content %}
<section class="auth-card">
    <div class="auth-heading">
        <h1>PromptVault</h1>
        <p>Masuk ke dashboard prompt marketing kamu.</p>
    </div>
    <form method="post" class="form">
        <label>Email
            <input type="email" name="email" required autocomplete="email">
        </label>
        <label>Password
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button class="btn btn-primary full" type="submit">Login</button>
    </form>
    <p class="auth-link">Belum punya akun? <a href="{{ url_for('register') }}">Register</a></p>
</section>
{% endblock %}
